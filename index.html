<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script defer src="scripts/theme-engine.js"></script>
  <script defer src="scripts/shared.js"></script>
</head>

<body class="dashboard">

<!-- HERO BANNER -->
<header id="hero-banner" class="hero-banner">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1 id="hero-title" class="hero-title">Your Cinematic Vacation</h1>
    <p id="hero-subtitle" class="hero-subtitle">Select a day to preview its theme</p>

    <button id="continue-trip-btn" class="continue-btn">
      Continue Trip
    </button>

    <div id="mode-indicator" class="mode-indicator">Preview Mode</div>
  </div>
</header>

<!-- QUICK ACCESS -->
<section class="quick-access">
  <button class="qa-btn" data-day-link="dining.html">🍽 Dining</button>
  <button class="qa-btn" data-day-link="packing.html">🎒 Packing</button>
  <button class="qa-btn" data-day-link="maps.html">🗺 Maps</button>
  <button class="qa-btn" data-day-link="tips.html">⚡ Tips</button>
  <button class="qa-btn" data-day-link="weather.html">🌦 Weather</button>
  <button class="qa-btn" data-day-link="llmp.html">🎢 LLMP Strategy</button>
</section>

<!-- DAY SELECTOR -->
<section class="day-grid">
  <div class="day-card" data-day="1" data-day-link="parks/Day1-Travel.html">
    <div class="day-label">Day 1</div>
    <div class="day-title">Travel Day</div>
  </div>

  <div class="day-card" data-day="2" data-day-link="parks/Day2-MK.html">
    <div class="day-label">Day 2</div>
    <div class="day-title">Magic Kingdom</div>
  </div>

  <div class="day-card" data-day="3" data-day-link="parks/Day3-EPCOT.html">
    <div class="day-label">Day 3</div>
    <div class="day-title">EPCOT</div>
  </div>

  <div class="day-card" data-day="4" data-day-link="parks/Day4-HS.html">
    <div class="day-label">Day 4</div>
    <div class="day-title">Hollywood Studios</div>
  </div>

  <div class="day-card" data-day="5" data-day-link="parks/Day5-AK.html">
    <div class="day-label">Day 5</div>
    <div class="day-title">Animal Kingdom</div>
  </div>

  <div class="day-card" data-day="6" data-day-link="parks/Day6-EpicUniverse.html">
    <div class="day-label">Day 6</div>
    <div class="day-title">Epic Universe</div>
  </div>

  <div class="day-card" data-day="7" data-day-link="parks/Day7-Universal.html">
    <div class="day-label">Day 7</div>
    <div class="day-title">Universal Studios / IOA</div>
  </div>

  <div class="day-card" data-day="8" data-day-link="parks/Day8-TravelHome.html">
    <div class="day-label">Day 8</div>
    <div class="day-title">Travel Home</div>
  </div>
</section>

</body>
</html>
